name: Check

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.8.22'

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --locked --project apps/backend

      - name: Validate Pull Request body
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python scripts/validate_pr_body.py

      - name: Test Pull Request body validator
        run: python scripts/test_validate_pr_body.py

      - name: Validate
        run: bash scripts/validate.sh
